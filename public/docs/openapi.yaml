      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: ahekjkmnnsbvaio
                  nullable: false
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: kaycee.carter@example.net
                  nullable: false
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: 'K][cDLj^Pz{S`cFHFXDM'
