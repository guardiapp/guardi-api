      summary: ''
      operationId: postApiResidents
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: boehm.archibald@example.org
                  nullable: false
                building_id:
                  type: string
                  description: 'The <code>id</code> of an existing record in the buildings table.'
                  example: vitae
                  nullable: false
                document:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: fkfxydfumvy
                  nullable: false
                first_name:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: avutxtcunmsikfcffqkn
                  nullable: false
                last_name:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: yx
                  nullable: false
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: omcg
                  nullable: false
                avatar:
                  type: string
                  format: binary
                  description: 'Must be an image. Must not be greater than 2048 kilobytes.'
                  nullable: true
                apartment:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: ljtc
                  nullable: false
              required:
                - email
                - building_id
                - document
                - first_name
                - last_name
                - phone
                - apartment
      security: []
  '/api/residents/{id}':
