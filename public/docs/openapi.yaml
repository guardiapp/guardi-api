                  example: jlrgtmhl
                  nullable: false
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: uip
                  nullable: false
                avatar:
                  type: string
                  format: binary
                  description: 'Must be an image. Must not be greater than 2048 kilobytes.'
                  nullable: true
                apartment:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: yfhvwlvplbhirqmbkplj
