        - Endpoints
      security: []
  /api/auth/me:
    get:
      summary: 'Información del usuario autenticado.'
      operationId: informacinDelUsuarioAutenticado
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
